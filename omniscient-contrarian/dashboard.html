<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Omniscient Contrarian — Live Terminal</title>
<style>
  :root { --bg:#EAEAEA; --ink:#000; --card:#fff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:"Helvetica Neue",Arial,sans-serif; padding:24px; }
  .wrap { max-width:1200px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }
  .card { background:var(--card); border:2px solid #000; padding:20px; }
  h1 { font-size:42px; font-weight:900; letter-spacing:-2px; text-transform:uppercase; margin:0; line-height:.95; }
  .sub { font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:#666; }
  .row { display:flex; flex-wrap:wrap; gap:16px; }
  .row > .card { flex:1; min-width:200px; }
  .label { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#666; }
  .big { font-size:40px; font-weight:900; letter-spacing:-1px; }
  .mid { font-size:24px; font-weight:900; }
  .bar { background:#000; color:#fff; padding:12px 16px; font-size:12px; font-weight:900; letter-spacing:2px; text-transform:uppercase; display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; background:#39FF14; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:10px; letter-spacing:2px; text-transform:uppercase; border-bottom:2px solid #000; padding:6px 4px; }
  td { padding:8px 4px; border-bottom:1px solid #ccc; font-family:ui-monospace,monospace; }
  .tag { padding:2px 8px; font-size:11px; font-weight:900; border:1px solid #000; text-transform:uppercase; }
  .buy { background:#000; color:#fff; } .sell { background:#fff; color:#c00; border-color:#c00; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
  .tok { border:2px solid #ccc; padding:8px; text-align:center; } .tok.b { border-color:#000; background:#000; color:#fff; } .tok.s { border-color:#c00; background:#fff0f0; }
  .tok .s1 { font-size:11px; font-weight:900; } .tok .s2 { font-size:26px; font-weight:900; } .tok .s3 { font-size:9px; font-weight:900; letter-spacing:1px; }
  a { color:#000; }
  .log { background:#000; color:#39FF14; font-family:ui-monospace,monospace; font-size:12px; padding:16px; max-height:240px; overflow:auto; }
  .log div { opacity:.9; }
  .off { background:#fff; border:4px solid #000; padding:30px; text-align:center; font-weight:900; letter-spacing:2px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="off">CONNECTING TO AGENT… (start it with <code>npm start</code> on port 3000)</div>
</div>

<script>
const API = "http://localhost:3000/status";
const f = (n,d=2)=> (n==null?"—":Number(n).toFixed(d));
const short = h => h ? h.slice(0,6)+"…"+h.slice(-4) : "";

async function tick(){
  let d;
  try { d = await (await fetch(API,{cache:"no-store"})).json(); }
  catch(e){ document.getElementById("app").innerHTML =
    '<div class="off">⚠ AGENT OFFLINE — start it on port 3000, then this refreshes automatically.</div>'; return; }

  const cs = d.convictionScore||{};
  const scan = (d.lastScanResults||[]).map(r=>`
    <div class="tok ${r.action==='BUY'?'b':r.action==='SELL'?'s':''}">
      <div class="s1">${r.symbol}</div><div class="s2">${r.score}</div><div class="s3">${r.action}</div></div>`).join("");
  const trades = (d.lastTrades||[]).map(t=>`
    <tr><td>${t.time}</td><td><span class="tag ${t.side==='BUY'?'buy':'sell'}">${t.side}</span></td>
    <td><b>${t.token}</b></td><td>$${f(t.amount)}</td>
    <td><a href="https://bscscan.com/tx/${t.txHash}" target="_blank">${short(t.txHash)}</a></td></tr>`).join("")
    || '<tr><td colspan="5" style="color:#999;font-style:italic">No trades yet…</td></tr>';
  const x402 = (d.x402Transactions||[]).map(x=>`
    <tr><td>${x.time}</td><td><span class="tag">${x.type}</span></td><td>$${f(x.amount)}</td>
    <td>${x.txHash?`<a href="https://basescan.org/tx/${x.txHash}" target="_blank">${short(x.txHash)}</a>`:'<span style="color:#999">pending…</span>'}</td></tr>`).join("")
    || '<tr><td colspan="4" style="color:#999;font-style:italic">No x402 payments yet…</td></tr>';
  const logs = (d.logFeed||[]).map(l=>`<div>${l}</div>`).join("");
  const chg = d["24hChange"]||0;

  document.getElementById("app").innerHTML = `
  <div class="card" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;align-items:center">
    <div><h1>Omniscient Contrarian</h1><div class="sub">BNB Hack 2026 · Live Self-Custody Trading Agent</div></div>
    <div style="text-align:right">
      <div class="label">Agent Status</div><div class="mid">${d.agentStatus||"—"}</div>
      <div class="label" style="margin-top:8px">Fear &amp; Greed</div><div class="mid">${d.fearGreed??"—"} ${d.fearGreedClass?("· "+d.fearGreedClass):""}</div>
    </div>
  </div>

  <div class="bar"><span class="dot"></span><span>Agent: ${d.agentStatus}</span><span>Epoch #${d.currentEpoch}</span>
    <span>Daily Trades: ${d.dailyTradeCount}</span><span>Daily Volume: $${f(d.dailySpentUsd)}</span></div>

  <div class="row">
    <div class="card"><div class="label">Portfolio Value</div><div class="big">$${f(d.portfolioValue)}</div>
      <div class="label" style="color:${chg>=0?'#070':'#c00'}">${chg>=0?'▲':'▼'} ${f(chg)}% since start</div></div>
    <div class="card"><div class="label">Conviction (composite)</div><div class="big">${cs.composite??"—"}</div>
      <div class="label">Hype ${cs.social} · Flow ${cs.flow} · Turn ${cs.funding} · Trend ${cs.news}</div></div>
    <div class="card"><div class="label">Drawdown</div><div class="big">${f(d.drawdownPercentage)}%</div>
      <div class="label">Best: ${d.bestSignal?`${d.bestSignal.symbol} → ${d.bestSignal.action} (${d.bestSignal.score})`:'—'}</div></div>
  </div>

  <div class="card"><div class="label" style="margin-bottom:10px">Token Scanner (last epoch)</div><div class="grid">${scan}</div></div>

  <div class="row">
    <div class="card"><div class="label" style="margin-bottom:8px">Execution Ledger (BSC trades)</div>
      <table><tr><th>Time</th><th>Side</th><th>Token</th><th>Amt</th><th>Tx</th></tr>${trades}</table></div>
    <div class="card"><div class="label" style="margin-bottom:8px">x402 Settlements (Base)</div>
      <table><tr><th>Time</th><th>Type</th><th>USDC</th><th>Tx</th></tr>${x402}</table></div>
  </div>

  <div class="card" style="padding:0"><div class="label" style="padding:16px 16px 0">Agent Log Feed</div>
    <div class="log">${logs}</div></div>`;
}
tick(); setInterval(tick, 3000);
</script>
</body>
</html>
